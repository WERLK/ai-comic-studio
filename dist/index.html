      (function() {
        var CURRENT_VERSION = '1.11.9';
        var versionKey = '__ai_comic_version';
        
        try {
          var cachedVersion = localStorage.getItem(versionKey);
          if (cachedVersion && cachedVersion !== CURRENT_VERSION) {
            // 检测到新版本，清除缓存并强制刷新
            localStorage.removeItem(versionKey);
            // 清除所有 ai_comic_ 前缀的缓存
            for (var i = localStorage.length - 1; i >= 0; i--) {
              var key = localStorage.key(i);
              if (key && key.startsWith('ai_comic_')) {
                localStorage.removeItem(key);
              }
            }
            // 使用 location.replace 避免在历史记录中留下刷新记录
            window.location.replace(window.location.href);
            return;
          }
          localStorage.setItem(versionKey, CURRENT_VERSION);
        } catch(e) {
          // localStorage 不可用，跳过版本检测
        }
      })();
    </script>
